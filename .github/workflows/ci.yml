name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt
      - name: Format
        run: cd backend && black --check --diff src tests scripts
      - name: PEP 8
        run: cd backend && ruff check src tests scripts
      - name: Typecheck
        run: cd backend && mypy src
      - name: Python dependency audit
        run: python -m pip_audit -r backend/requirements.txt
      - name: Test
        env:
          RETOS_ENV: test
          RETOS_ALLOW_PAID_LLM: "false"
        run: |
          cd backend
          pytest
          python scripts/check_branch_coverage.py --fail-under 83.94
      - name: Eval smoke
        env:
          RETOS_ALLOW_PAID_LLM: "false"
        run: cd backend && PYTHONPATH=src python scripts/run_eval_smoke.py --format markdown
      - name: API smoke
        env:
          RETOS_ENV: test
          RETOS_ALLOW_PAID_LLM: "false"
          RETOS_JWT_SECRET: test-secret-value-that-is-long-enough
          RETOS_BOOTSTRAP_ADMIN_EMAIL: admin@retos.dev
          RETOS_BOOTSTRAP_ADMIN_PASSWORD: test-admin-password
        run: cd backend && scripts/run_api_smoke.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Node dependency audit
        run: cd frontend && npm audit --audit-level=high
      - name: Check
        run: cd frontend && npm run check
      - name: Install browser
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Browser smoke
        run: cd frontend && npm run e2e

  docker:
    runs-on: ubuntu-latest
    env:
      RETOS_VERSION: ci
      RETOS_REVISION: ${{ github.sha }}
      RETOS_CREATED: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install smoke dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Compose config
        run: docker compose --env-file .env.example config
      - name: Docker topology
        run: scripts/check_docker_topology.sh
      - name: Release readiness
        run: scripts/check_release_readiness.sh
      - name: Production audit pack
        run: scripts/check_audit_pack.sh
      - name: Release workflow
        run: scripts/check_release_workflow.sh
      - name: Release notes
        run: scripts/check_release_notes.sh
      - name: Versioned release notes
        run: scripts/check_versioned_release_notes.sh
      - name: Image metadata source
        run: scripts/check_image_metadata.sh
      - name: Docker stack smoke
        run: scripts/run_docker_smoke.sh
