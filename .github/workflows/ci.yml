name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt
      - name: Format
        run: cd backend && black --check --diff src tests
      - name: PEP 8
        run: cd backend && ruff check src tests
      - name: Typecheck
        run: cd backend && mypy src
      - name: Test
        env:
          RETOS_ENV: test
          RETOS_ALLOW_PAID_LLM: "false"
        run: cd backend && pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Check
        run: cd frontend && npm run check
